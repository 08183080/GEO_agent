    - data:
        code: "import json\n\ndef main(item: str, text: str, result: str) -> dict:\n\
          \    \"\"\"\n    此函数在Dify代码节点中运行。\n    它接收三个字符串输入：\n    1. item:   来自“迭代”节点的当前提示词\n\
          \    2. text:   来自“生成文章”节点的文章内容\n    3. result: 来自“提取分数”节点的分数（字符串形式）\n\n\
          \    它将这三个输入合并为一个字典（Object），\n    并将其赋值给名为 'res' 的输出变量。\n    \"\"\"\n  \
          \  \n    # 尝试将分数（result）从字符串转换为浮点数\n    try:\n        score_float = float(result)\n\
          \    except ValueError:\n        # 如果转换失败（例如，分数节点返回了错误信息），\n        # 则保持原始的字符串值\n\
          \        score_float = result\n    \n    text = text.replace('\\n', '')\n\
          \n    # 1. 构建包含所有信息的字典\n    combined_data = {\n        \"prompt\": item,\n\
          \        \"article\": text,\n        \"score\": score_float\n    }\n   \
          \ \n    # 2. 将这个字典作为输出变量 \"res\" 的值返回\n    # Dify 要求代码的返回值是一个字典，键名必须匹配你定义的输出变量\n\
          \    return {\n        \"res\": combined_data\n    }"
