    - data:
        code: "import json\n\ndef main(arg1: str):\n    \"\"\"\n    此函数在Dify代码节点中运行。\n\
          \    arg1: 接收传入的JSON字符串 (来自HTTP请求节点)。\n    返回: 一个字典，'result'键对应的值将作为节点的输出。\n\
          \    \"\"\"\n    \n    # arg1 就是你传入的JSON字符串，我们在这里重命名它以便理解\n    json_string\
          \ = arg1\n    \n    try:\n        # 1. 解析JSON字符串\n        data = json.loads(json_string)\n\
          \n        # 2. 安全地提取relevance_score\n        if 'data' in data and 'results'\
          \ in data['data'] and data['data']['results']:\n            \n         \
          \   first_result = data['data']['results'][0]\n            \n          \
          \  if 'relevance_score' in first_result:\n                # 3. 获取分数并格式化\n\
          \                score = first_result['relevance_score'] \n            \
          \    formatted_score = f\"{score:.4f}\" # e.g., \"0.8518\"\n           \
          \     \n                # 4. 按Dify要求返回字典\n                return {\n   \
          \                 \"result\": formatted_score\n                }\n     \
          \       else:\n                # 处理错误情况，同样返回字典\n                return {\"\
          result\": \"错误: 在'results'中未找到 'relevance_score' 键\"}\n        else:\n \
          \           return {\"result\": \"错误: 'data' 或 'results' 键缺失，或 'results'\
          \ 列表为空\"}\n\n    except json.JSONDecodeError:\n        return {\"result\"\
          : \"错误: 输入的不是有效的JSON字符串\"}\n    except Exception as e:\n        return {\"\
          result\": f\"发生意外错误: {e}\"}"
